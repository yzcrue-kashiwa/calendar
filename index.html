<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スタジオ予約カレンダー</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; width: 100%; max-width: 600px; }
  th, td { border: 1px solid #ccc; text-align: center; padding: 8px; }
  th { background: #f0f0f0; }
  td.past { background: #eee; color: #999; }
  td.available { background: #d4fcd4; cursor: pointer; }
</style>
</head>
<body>

<h1>スタジオ予約カレンダー</h1>
<table id="calendar">
  <thead>
    <tr>
      <th>月</th>
      <th>火</th>
      <th>水</th>
      <th>木</th>
      <th>金</th>
      <th>土</th>
      <th>日</th>
    </tr>
  </thead>
  <tbody id="calendar-body">
  </tbody>
</table>

<script>
// サンプルJSON（Pythonで作ったreservations.jsonの内容をここに貼る）
const reservations = [
  {"date":"2026-03-19","type":"1部○","source":"Couleur"},
  {"date":"2026-03-19","type":"2部○","source":"Couleur"},
  {"date":"2026-03-19","type":"1部○","source":"Claris"},
  {"date":"2026-03-19","type":"2部○","source":"Claris"}
];

// 今日の日付
const today = new Date();

// 今月情報
const year = today.getFullYear();
const month = today.getMonth(); // 0始まり

// 月の初日と最終日
const firstDay = new Date(year, month, 1);
const lastDay = new Date(year, month + 1, 0);

// 曜日が月曜始まりになるよう調整
const startDay = (firstDay.getDay() + 6) % 7;

// カレンダー本体
const tbody = document.getElementById("calendar-body");
let tr = document.createElement("tr");

// 空セルを追加
for (let i = 0; i < startDay; i++) {
  const td = document.createElement("td");
  tr.appendChild(td);
}

// 日付ループ
for (let day = 1; day <= lastDay.getDate(); day++) {
  const td = document.createElement("td");
  const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

  // 過ぎた日はグレーアウト
  const dateObj = new Date(year, month, day);
  if (dateObj < today.setHours(0,0,0,0)) {
    td.className = "past";
    td.textContent = day;
  } else {
    // 予約がある日だけ表示
    const dayReservations = reservations.filter(r => r.date === dateStr);
    if (dayReservations.length > 0) {
      td.className = "available";
      td.innerHTML = `${day}<br>${dayReservations.map(r => r.type + " (" + r.source + ")").join("<br>")}`;
    } else {
      td.textContent = day;
    }
  }

  tr.appendChild(td);

  // 1週間ごとに新しい行
  if ((day + startDay) % 7 === 0) {
    tbody.appendChild(tr);
    tr = document.createElement("tr");
  }
}

// 残りのセルを追加
if (tr.children.length > 0) {
  while (tr.children.length < 7) {
    const td = document.createElement("td");
    tr.appendChild(td);
  }
  tbody.appendChild(tr);
}
</script>

</body>
</html>
