<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h2 {
  margin-bottom: 5px;
}

/* ===== グリッド ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

/* ===== 曜日ヘッダー ===== */
.header {
  font-weight: bold;
  text-align: center;
}

/* ===== 日付セル ===== */
.day {
  border: 1px solid #ccc;
  min-height: 80px;
  padding: 5px;
  font-size: 13px;
}

/* 今日 */
.today {
  background: #ffe0e0;
}

/* 土日 */
.sun { color: red; }
.sat { color: blue; }

/* ===== イベント ===== */
.event {
  margin: 2px 0;
  padding: 2px;
  font-size: 11px;
  border-radius: 3px;
  color: #fff;
}

/* 店舗色 */
.couleur { background: #ff7aa2; }
.claris { background: #4da6ff; }
.fuel { background: #ff9f40; }

</style>
</head>

<body>

<h2>予約カレンダー</h2>
<p id="info"></p>

<div class="grid" id="calendar"></div>

<script>
const DAYS = 10;

// ===== 日付フォーマット =====
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

// ===== 月曜始まり用調整 =====
function getStartMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  return d;
}

// ===== カレンダー日付生成 =====
function getCalendarDates() {
  const today = new Date();
  const start = getStartMonday(today);

  const dates = [];

  for (let i = 0; i < 14; i++) { // 2週間分
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    dates.push(d);
  }

  return dates;
}

// ===== メイン =====
async function load() {

  const res = await fetch("events.json?" + Date.now());
  const data = await res.json();

  console.log(data);

  const map = {};
  data.forEach(e => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  // ===== 曜日ヘッダー（月曜始まり）=====
  const days = ["月","火","水","木","金","土","日"];
  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "header";
    div.textContent = d;
    calendar.appendChild(div);
  });

  const todayStr = formatDate(new Date());
  const dates = getCalendarDates();

  dates.forEach(d => {

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day";

    if (dateStr === todayStr) div.classList.add("today");
    if (d.getDay() === 0) div.classList.add("sun");
    if (d.getDay() === 6) div.classList.add("sat");

    div.innerHTML = `<b>${d.getMonth()+1}/${d.getDate()}</b>`;

    // ===== イベント描画 =====
    if (map[dateStr]) {
      map[dateStr].forEach(ev => {
        const el = document.createElement("div");
        el.className = `event ${ev.site}`;
        el.textContent = `${ev.site} ${ev.part}`;
        div.appendChild(el);
      });
    }

    calendar.appendChild(div);
  });

  // ===== 更新情報 =====
  const now = new Date();
  document.getElementById("info").textContent =
    `取得日: ${todayStr} / 更新: ${now.toLocaleTimeString()}`;
}

load();
</script>

</body>
</html>
