<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* 更新日時 */
#updated {
  font-size: 12px;
  margin-bottom: 10px;
  color: #666;
}

/* カレンダー */
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

/* 日付セル */
.day {
  border: 1px solid #ccc;
  padding: 5px;
  min-height: 80px;
  font-size: 12px;
  border-radius: 6px;
}

/* 過去日 */
.past {
  background: #eee;
  color: #999;
}

/* 日付 */
.date {
  font-weight: bold;
  margin-bottom: 4px;
  font-size: 12px;
}

/* イベント共通 */
.event {
  font-size: 11px;
  margin: 2px 0;
  padding: 2px 4px;
  border-radius: 4px;
  color: #fff;
}

/* 店ごと色 */
.couleur { background: #3498db; }
.claris  { background: #e91e63; }
.fuel    { background: #ff9800; }

/* ===== スマホ最適化 ===== */
@media (max-width: 600px) {

  #calendar {
    gap: 3px;
  }

  .day {
    min-height: 70px;
    font-size: 10px;
    padding: 4px;
  }

  .date {
    font-size: 10px;
  }

  .event {
    font-size: 9px;
    padding: 2px;
  }
}
</style>
</head>

<body>

<h2>予約カレンダー</h2>
<div id="updated"></div>
<div id="calendar"></div>

<script>

// ===== 日付フォーマット =====
function formatDate(d) {
  const y = d.getFullYear()
  const m = String(d.getMonth() + 1).padStart(2, '0')
  const day = String(d.getDate()).padStart(2, '0')
  return `${y}-${m}-${day}`
}

// ===== 表示範囲 =====
function getDisplayDates() {
  const today = new Date()
  const day = today.getDay()

  const mondayOffset = (day === 0 ? -6 : 1 - day)

  const start = new Date(today)
  start.setDate(today.getDate() + mondayOffset)

  const end = new Date(start)
  end.setDate(start.getDate() + 20)

  const dates = []
  let cur = new Date(start)

  while (cur <= end) {
    dates.push(new Date(cur))
    cur.setDate(cur.getDate() + 1)
  }

  return dates
}

// ===== メイン =====
async function render() {

  try {
    const res = await fetch("./docs/events.json?v=" + Date.now())
    const events = await res.json()

    console.log("EVENTS:", events)

    const cal = document.getElementById("calendar")
    cal.innerHTML = ""

    const updated = document.getElementById("updated")
    updated.innerText = "最終更新: " + new Date().toLocaleString()

    const today = new Date()
    today.setHours(0,0,0,0)

    const dates = getDisplayDates()

    dates.forEach(d => {

      const el = document.createElement("div")
      el.className = "day"

      const d2 = new Date(d)
      d2.setHours(0,0,0,0)

      if (d2 < today) {
        el.classList.add("past")
      }

      const dateStr = formatDate(d)

      // 日付
      const dateEl = document.createElement("div")
      dateEl.className = "date"
      dateEl.innerText = dateStr
      el.appendChild(dateEl)

      // 🔥 日付ズレ対策
      const dayEvents = events.filter(e => 
        e.date.slice(0,10) === dateStr
      )

      dayEvents.forEach(e => {
        const ev = document.createElement("div")

        // 店ごと色
        ev.className = "event " + e.site

        ev.innerText = e.part

        el.appendChild(ev)
      })

      cal.appendChild(el)
    })

  } catch (e) {
    console.error("エラー:", e)
  }
}

render()

</script>

</body>
</html>
