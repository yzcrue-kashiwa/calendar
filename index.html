<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタジオ空きカレンダー</title>

<!-- キャッシュ無効化 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
  body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
  h1 { text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #eee; }
  .Couleur { background-color: #ffdede; }
  .Colore { background-color: #deffde; }
  .Claris { background-color: #dedeff; }
</style>
</head>
<body>

<h1>スタジオ空きカレンダー</h1>
<button onclick="loadData()">更新</button>

<table id="calendar">
  <thead>
    <tr>
      <th>日付</th>
      <th>時間帯</th>
      <th>店舗</th>
    </tr>
  </thead>
  <tbody>
    <tr><td colspan="3">読み込み中…</td></tr>
  </tbody>
</table>

<script>
async function loadData() {
  const tbody = document.querySelector("#calendar tbody");
  tbody.innerHTML = "<tr><td colspan='3'>読み込み中…</td></tr>";

  try {
    const res = await fetch("./data.json?nocache=" + new Date().getTime());
    const data = await res.json();

    if(data.length === 0){
      tbody.innerHTML = "<tr><td colspan='3'>空きはありません</td></tr>";
      return;
    }

    tbody.innerHTML = "";
    data.forEach(event => {
      const tr = document.createElement("tr");
      tr.className = event.source;
      tr.innerHTML = `
        <td>${event.date}</td>
        <td>${event.type}</td>
        <td>${event.source}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch(e) {
    tbody.innerHTML = "<tr><td colspan='3'>読み込みエラー</td></tr>";
    console.error(e);
  }
}

// ページ読み込み時に自動更新
window.addEventListener("load", loadData);
</script>

</body>
</html>
