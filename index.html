<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタジオ空きカレンダー</title>

<style>
  body { font-family: sans-serif; padding: 1rem; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
  th { background: #eee; }
  .empty { color: #888; }
  .Couleur { background:#ffdede; }
  .Colore { background:#ddf; }
  .Claris { background:#dfd; }
</style>
</head>
<body>
<h2>スタジオ空きカレンダー</h2>
<button onclick="loadCalendar()">更新</button>
<table id="calendar">
  <thead>
    <tr>
      <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadCalendar() {
  const res = await fetch("./data.json?nocache=" + new Date().getTime());
  const data = await res.json();

  const today = new Date();
  const endDate = new Date();
  endDate.setDate(today.getDate() + 30);

  const filtered = data.filter(e => e.type.includes('○'));

  const byDate = {};
  filtered.forEach(e => {
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  });

  const tbody = document.querySelector("#calendar tbody");
  tbody.innerHTML = "";
  
  let cursor = new Date(today);
  cursor.setDate(cursor.getDate() - ((cursor.getDay()+6)%7));

  while (cursor <= endDate) {
    const tr = document.createElement("tr");
    for (let i = 0; i < 7; i++) {
      const td = document.createElement("td");
      const key = cursor.toISOString().slice(0,10);
      const list = byDate[key] || [];

      if (list.length) {
        list.forEach(ev => {
          const span = document.createElement("span");
          span.textContent = `${ev.type} (${ev.source})`;
          span.style.display = "block";
          span.className = ev.source;
          td.appendChild(span);
        });
      } else {
        td.innerHTML = "<span class='empty'>空きなし</span>";
      }
      tr.appendChild(td);
      cursor.setDate(cursor.getDate()+1);
    }
    tbody.appendChild(tr);
  }
}

loadCalendar();
</script>

</body>
</html>
