<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空きカレンダー</title>

<style>
body { font-family:sans-serif; padding:20px; }
h1 { text-align:center; }

#info { text-align:center; margin-bottom:10px; }

#calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  max-width:900px;
  margin:0 auto;
}

.header {
  text-align:center;
  font-weight:bold;
}

.day {
  border:1px solid #ccc;
  min-height:90px;
  padding:6px;
}

.today { border:2px solid red; }
.sat { background:#e6f0ff; }
.sun { background:#ffe6e6; }

.date { font-weight:bold; }

.event {
  margin-top:3px;
  padding:2px 4px;
  border-radius:4px;
  font-size:12px;
}

.couleur { background:#cb0cc8; color:#fff; }
.claris  { background:#0000cb; color:#fff; }
.fuel    { background:#2cb4ad; color:#fff; }

.empty { opacity:0.4; }
</style>
</head>

<body>

<h1>直近10日 空きカレンダー</h1>
<div id="info"></div>
<div id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const info = document.getElementById("info");

const today = new Date();

// ===== utils =====
function formatDate(d){
  return d.toISOString().slice(0,10);
}

function formatJP(d){
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// 月曜始まり
function getWeekIndex(d){
  return d.getDay() === 0 ? 6 : d.getDay() - 1;
}

function getDayClass(d){
  const w = d.getDay();
  if(w===0) return "sun";
  if(w===6) return "sat";
  return "";
}

// ===== カレンダー描画 =====
function createCalendar(events){

  calendar.innerHTML = "";

  // 曜日
  ["月","火","水","木","金","土","日"].forEach(d=>{
    const el=document.createElement("div");
    el.className="header";
    el.textContent=d;
    calendar.appendChild(el);
  });

  // ⭐ここ重要：最初の空白
  const startIndex = getWeekIndex(today);
  for(let i=0;i<startIndex;i++){
    calendar.appendChild(document.createElement("div"));
  }

  // ⭐10日ループ
  for(let i=0;i<10;i++){

    const d = new Date(today);
    d.setDate(today.getDate()+i);

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day " + getDayClass(d);

    if(i===0) div.classList.add("today");

    const dayEvents = events.filter(e=>e.date===dateStr);

    // 日付
    const dateEl = document.createElement("div");
    dateEl.className="date";
    dateEl.textContent=`${formatJP(d)} (${dayEvents.length})`;

    div.appendChild(dateEl);

    // 空日
    if(dayEvents.length===0){
      div.classList.add("empty");
    }

    // イベント
    dayEvents.forEach(e=>{
      const ev=document.createElement("div");
      ev.className=`event ${e.site}`;
      ev.textContent=`${e.site} ${e.part}`;
      div.appendChild(ev);
    });

    calendar.appendChild(div);
  }
}

// ===== 情報 =====
function showInfo(){
  const now=new Date();
  info.innerHTML=`
    今日: ${formatJP(today)}　
    更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}
  `;
}

// ===== fetch =====
fetch("https://yzcrue-kashiwa.github.io/calendar/events.json")
  .then(res=>res.json())
  .then(data=>{
    createCalendar(data);
    showInfo();
  });

</script>

</body>
</html>
