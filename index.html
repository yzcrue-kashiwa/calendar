<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スタジオ空きカレンダー</title>
<style>
  body { font-family: sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; text-align: center; padding: 5px; }
  th { background: #f0f0f0; }
  .empty { color: #ccc; }
</style>
</head>
<body>
<h2>スタジオ空きカレンダー（貸切非表示）</h2>
<table id="calendar">
  <thead>
    <tr>
      <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const DAYS_TO_SHOW = 10; // 今日から10日間
const today = new Date();

// JSON読み込み
fetch('./data.json')
  .then(r => r.json())
  .then(data => {
    // 貸切を除外して空きだけにする
    const available = data.filter(d => !d.type.toLowerCase().includes('貸切'));

    // 日付ごとにまとめる
    const byDate = {};
    available.forEach(ev => {
      if (!byDate[ev.date]) byDate[ev.date] = [];
      byDate[ev.date].push(ev.type + ' (' + ev.source + ')');
    });

    // カレンダー描画
    const tbody = document.querySelector('#calendar tbody');
    let date = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    let row = document.createElement('tr');
    
    // 月曜始まりにするための空セル
    let startDay = (date.getDay() + 6) % 7;
    for (let i = 0; i < startDay; i++) {
      let td = document.createElement('td');
      td.className = 'empty';
      row.appendChild(td);
    }

    for (let i = 0; i < DAYS_TO_SHOW; i++) {
      let td = document.createElement('td');
      const ymd = date.toISOString().slice(0,10);
      td.innerHTML = date.getDate() + '<br>' + (byDate[ymd]?.join('<br>') || '×');
      row.appendChild(td);

      if ((date.getDay() + 6) % 7 === 6) { // 日曜で改行
        tbody.appendChild(row);
        row = document.createElement('tr');
      }
      date.setDate(date.getDate() + 1);
    }
    // 最後の行を追加
    if (row.children.length > 0) tbody.appendChild(row);
  })
  .catch(e => {
    console.error('JSON読み込みエラー:', e);
  });
</script>
</body>
</html>
