<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空き状況</title>
<meta http-equiv="Cache-Control" content="no-cache">
</head>

<body>
<h1>空き状況</h1>
  <p id="updated" style="text-align:center; color:gray;"></p>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

.list {
  max-width: 500px;
  margin: auto;
}

.item {
  border-bottom: 1px solid #ccc;
  padding: 10px;
}

.date {
  font-weight: bold;
}

.type {
  color: green;
}
</style>
<div class="list" id="list"></div>
<div style="text-align:center; margin: 10px;">
  <button onclick="reloadData()" 
    style="padding:10px 20px; font-size:16px; border-radius:8px; cursor:pointer;">
    🔄 更新する
  </button>
</div>
<script>
  reloadData();
fetch("data.json")
  .then(res => {
    // 更新時刻取得
    const lastModified = res.headers.get("Last-Modified");

    if (lastModified) {
      const date = new Date(lastModified);
      document.getElementById("updated").textContent =
        "最終更新: " + date.toLocaleString();
    }

    return res.json();
  })
  .then(data => {
    const list = document.getElementById("list");

    if (data.length === 0) {
      list.innerHTML = "現在空きはありません";
      return;
    }

    data.forEach(d => {
      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div class="date">${d.date}</div>
        <div class="type">空きあり（${d.type}）</div>
      `;

      list.appendChild(div);
    });
  });
</script>
</body>
</html>
