<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 800px;
  margin: 0 auto;
}

.day {
  border: 1px solid #ccc;
  padding: 8px;
  min-height: 80px;
  font-size: 14px;
  position: relative;
}

.date {
  font-weight: bold;
}

/* 土日カラー */
.sat {
  background-color: #e6f0ff;
}

.sun {
  background-color: #ffe6e6;
}

/* イベント */
.event {
  margin-top: 4px;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 12px;
}

.couleur {
  background: #cb0cc8;
  color: #fff;
}

.claris {
  background: #0000cb;
  color: #fff;
}

.fuel {
  background: #2cb4ad;
  color: #fff;
}
</style>
</head>

<body>

<h1>予約カレンダー</h1>

<div id="calendar"></div>

<script>
const YEAR = 2026;
const MONTH = 4;

const calendar = document.getElementById("calendar");

// 曜日（0=日,6=土）
function getDayClass(year, month, day) {
  const d = new Date(year, month - 1, day);
  const w = d.getDay();

  if (w === 0) return "sun";
  if (w === 6) return "sat";
  return "";
}

// カレンダー枠作成
function createCalendar(events) {

  calendar.innerHTML = "";

  const lastDay = new Date(YEAR, MONTH, 0).getDate();

  for (let d = 1; d <= lastDay; d++) {

    const dateStr = `${YEAR}-${String(MONTH).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    const dayDiv = document.createElement("div");
    dayDiv.className = "day " + getDayClass(YEAR, MONTH, d);

    const dateEl = document.createElement("div");
    dateEl.className = "date";
    dateEl.textContent = d;

    dayDiv.appendChild(dateEl);

    // イベント追加
    events
      .filter(e => e.date === dateStr)
      .forEach(e => {

        const ev = document.createElement("div");
        ev.className = `event ${e.site}`;
        ev.textContent = `${e.site} ${e.part}`;

        dayDiv.appendChild(ev);
      });

    calendar.appendChild(dayDiv);
  }
}

// データ取得
fetch("https://yzcrue-kashiwa.github.io/calendar/events.json")
  .then(res => res.json())
  .then(data => {
    console.log("EVENTS:", data);
    createCalendar(data);
  })
  .catch(err => {
    console.error("ERROR:", err);
  });

</script>

</body>
</html>
