<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

#info {
  text-align: center;
  margin-bottom: 10px;
  font-size: 14px;
  color: #555;
}

#calendar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  max-width: 900px;
  margin: 0 auto;
}

.day {
  border: 1px solid #ccc;
  padding: 8px;
  min-height: 90px;
}

.date {
  font-weight: bold;
  margin-bottom: 4px;
}

/* 土日 */
.sat { background: #e6f0ff; }
.sun { background: #ffe6e6; }

/* イベント */
.event {
  margin-top: 3px;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 12px;
}

.couleur { background: #cb0cc8; color:#fff; }
.claris  { background: #0000cb; color:#fff; }
.fuel    { background: #2cb4ad; color:#fff; }
</style>
</head>

<body>

<h1>予約カレンダー（直近10日）</h1>

<div id="info"></div>
<div id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const info = document.getElementById("info");

// 今日
const today = new Date();

// 日付フォーマット
function formatDate(d) {
  return d.toISOString().slice(0,10);
}

// 表示用
function formatJP(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// 土日判定
function getDayClass(d) {
  const w = d.getDay();
  if (w === 0) return "sun";
  if (w === 6) return "sat";
  return "";
}

// カレンダー生成（10日分）
function createCalendar(events) {

  calendar.innerHTML = "";

  for (let i = 0; i < 10; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day " + getDayClass(d);

    const dateEl = document.createElement("div");
    dateEl.className = "date";
    dateEl.textContent = formatJP(d);

    div.appendChild(dateEl);

    // イベント
    events
      .filter(e => e.date === dateStr)
      .forEach(e => {
        const ev = document.createElement("div");
        ev.className = `event ${e.site}`;
        ev.textContent = `${e.site} ${e.part}`;
        div.appendChild(ev);
      });

    calendar.appendChild(div);
  }
}

// 更新時間表示
function showInfo() {
  const now = new Date();

  info.innerHTML = `
    今日: ${formatJP(today)}　
    更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}
  `;
}

// データ取得
fetch("https://yzcrue-kashiwa.github.io/calendar/events.json")
  .then(res => res.json())
  .then(data => {
    console.log(data);
    createCalendar(data);
    showInfo();
  })
  .catch(err => {
    console.error(err);
  });

</script>

</body>
</html>
