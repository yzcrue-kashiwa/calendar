<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空き状況確認用カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  margin-bottom: 5px;
}

#updated {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  border: 1px solid #ccc;
  padding: 6px;
  min-height: 80px;
  font-size: 12px;
}

.header {
  font-weight: bold;
  text-align: center;
  background: #eee;
}

.past {
  background: #f5f5f5;
  color: #aaa;
}

.date {
  font-weight: bold;
  margin-bottom: 4px;
}

/* 店舗色 */
.couleur { color: #e91e63; }
.claris { color: #3f51b5; }
.fuel { color: #009688; }

.event {
  margin: 2px 0;
  font-size: 11px;
}
</style>
</head>

<body>

<h1>予約カレンダー</h1>
<div id="updated"></div>

<div class="calendar" id="calendar"></div>

<script>

fetch("events.json")
  .then(res => res.json())
  .then(data => {

    const cal = document.getElementById("calendar");

    // ===== アクセス時間 =====
    const now = new Date();
    document.getElementById("updated").innerText =
      "更新: " + now.toLocaleString();

    // ===== 月曜始まり =====
    const getMonday = (d) => {
      const date = new Date(d);
      const day = date.getDay();
      const diff = (day === 0 ? -6 : 1) - day;
      date.setDate(date.getDate() + diff);
      return date;
    };

    const start = getMonday(now);

    // 翌々週の日曜
    const end = new Date(start);
    end.setDate(start.getDate() + 20);

    // ===== ヘッダー =====
    const days = ["月","火","水","木","金","土","日"];
    days.forEach(d => {
      const el = document.createElement("div");
      el.className = "day header";
      el.innerText = d;
      cal.appendChild(el);
    });

    // ===== 日付ループ =====
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {

      const dateStr =
  d.getFullYear() + "-" +
  String(d.getMonth()+1).padStart(2,"0") + "-" +
  String(d.getDate()).padStart(2,"0");

      const cell = document.createElement("div");
      cell.className = "day";

      // 過去日
      if (d < new Date(now.toDateString())) {
        cell.classList.add("past");
      }

      const dateEl = document.createElement("div");
      dateEl.className = "date";
      dateEl.innerText = d.getDate();
      cell.appendChild(dateEl);

      // ===== イベント =====
      const events = data.filter(e => e.date === dateStr);

      events.forEach(ev => {
        const e = document.createElement("div");
        e.className = "event " + ev.site;
        e.innerText = `${ev.site} ${ev.part}`;
        cell.appendChild(e);
      });

      cal.appendChild(cell);
    }

  });

</script>

</body>
</html>
