<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コローレ系列空き状況カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* 更新 */
#updated {
  font-size: 12px;
  margin-bottom: 10px;
  color: #666;
}

/* カレンダー */
#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

/* 日付 */
.day {
  border: 1px solid #ccc;
  padding: 5px;
  min-height: 80px;
  font-size: 12px;
  border-radius: 6px;
}

.past {
  background: #eee;
  color: #999;
}

.date {
  font-weight: bold;
  margin-bottom: 4px;
}

/* イベント */
.event {
  font-size: 11px;
  margin: 2px 0;
  padding: 2px 4px;
  border-radius: 4px;
  color: #fff;
}

/* 色分け */
.couleur { background: #3498db; }
.claris  { background: #e91e63; }
.fuel    { background: #ff9800; }

/* ===== リンクエリア ===== */
#links {
  margin-top: 20px;
  padding-top: 10px;
  border-top: 1px solid #ccc;
}

.link-btn {
  display: block;
  margin: 6px 0;
  padding: 8px;
  text-align: center;
  border-radius: 6px;
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

.link-couleur { background: #3498db; }
.link-claris  { background: #e91e63; }
.link-fuel    { background: #ff9800; }

/* ===== スマホ ===== */
@media (max-width: 600px) {
  .day {
    min-height: 70px;
    font-size: 10px;
  }
  .event {
    font-size: 9px;
  }
}
</style>
</head>

<body>

<h2>予約カレンダー</h2>
<div id="updated"></div>
<div id="calendar"></div>

<!-- 🔗 店舗リンク -->
<div id="links">
  <h3>カレンダー元ページ</h3>

  <a class="link-btn link-couleur" href="https://couleur.studio-colore.tokyo/yoyaku-toiawase/" target="_blank">
    couleur
  </a>

  <a class="link-btn link-claris" href="https://claris-studio-colore-mixbox.com/reserve/" target="_blank">
    claris
  </a>

  <a class="link-btn link-fuel" href="https://fuel-studio-colore.com/reserve/" target="_blank">
    fuel
  </a>
</div>

<script>

// ===== 日付フォーマット =====
function formatDate(d) {
  const y = d.getFullYear()
  const m = String(d.getMonth() + 1).padStart(2, '0')
  const day = String(d.getDate()).padStart(2, '0')
  return `${y}-${m}-${day}`
}

// ===== 表示範囲 =====
function getDisplayDates() {
  const today = new Date()
  const day = today.getDay()

  const mondayOffset = (day === 0 ? -6 : 1 - day)
  const start = new Date(today)
  start.setDate(today.getDate() + mondayOffset)

  const end = new Date(start)
  end.setDate(start.getDate() + 20)

  while (end.getDay() !== 0) {
    end.setDate(end.getDate() + 1)
  }

  const dates = []
  let cur = new Date(start)

  while (cur <= end) {
    dates.push(new Date(cur))
    cur.setDate(cur.getDate() + 1)
  }

  return dates
}

// ===== メイン =====
async function render() {

  try {
    const res = await fetch("./docs/events.json?v=" + Date.now())
    const events = await res.json()

    const cal = document.getElementById("calendar")
    cal.innerHTML = ""

    document.getElementById("updated").innerText =
      "最終更新: " + new Date().toLocaleString()

    const today = new Date()
    today.setHours(0,0,0,0)

    const dates = getDisplayDates()

    dates.forEach(d => {

      const el = document.createElement("div")
      el.className = "day"

      const d2 = new Date(d)
      d2.setHours(0,0,0,0)

      if (d2 < today) {
        el.classList.add("past")
      }

      const dateStr = formatDate(d)

      const dateEl = document.createElement("div")
      dateEl.className = "date"
      dateEl.innerText = dateStr
      el.appendChild(dateEl)

      const dayEvents = events.filter(e =>
        e.date.slice(0,10) === dateStr
      )

      dayEvents.forEach(e => {
        const ev = document.createElement("div")
        ev.className = "event " + e.site
        ev.innerText = `${e.site} ${e.part}`
        el.appendChild(ev)
      })

      cal.appendChild(el)
    })

  } catch (e) {
    console.error("エラー:", e)
  }
}

render()

</script>

</body>
</html>
