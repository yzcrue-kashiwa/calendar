<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 10px;
}

.day {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}

.today {
  background: #ffe0e0;
}

.sat {
  color: blue;
}

.sun {
  color: red;
}

.ok {
  background: #c8f7c5;
  margin: 2px;
  padding: 2px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>予約状況</h2>
<p id="info"></p>

<div class="grid" id="calendar"></div>

<script>
const DAYS = 10;

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function getDates() {
  const dates = [];
  const today = new Date();

  for (let i = 0; i < DAYS; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);
    dates.push(new Date(d));
  }
  return dates;
}

async function load() {

  const res = await fetch("events.json?" + Date.now());
  const data = await res.json();

  console.log("EVENTS:", data);

  const map = {};

  data.forEach(e => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const dates = getDates();

  dates.forEach((d, i) => {

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day";

    if (i === 0) div.classList.add("today");
    if (d.getDay() === 0) div.classList.add("sun");
    if (d.getDay() === 6) div.classList.add("sat");

    div.innerHTML = `<b>${d.getMonth()+1}/${d.getDate()}</b>`;

    if (map[dateStr]) {
      map[dateStr].forEach(ev => {
        const el = document.createElement("div");
        el.className = "ok";
        el.textContent = `${ev.site} ${ev.part}`;
        div.appendChild(el);
      });
    }

    calendar.appendChild(div);
  });

  // 更新情報
  const now = new Date();
  document.getElementById("info").textContent =
    `取得日: ${formatDate(now)} / 更新: ${now.toLocaleTimeString()}`;
}

load();
</script>

</body>
</html>
