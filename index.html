<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

#info {
  text-align: center;
  margin-bottom: 10px;
  font-size: 14px;
}

#calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 900px;
  margin: 0 auto;
}

/* 曜日ヘッダー */
.header {
  font-weight: bold;
  text-align: center;
}

/* 日付 */
.day {
  border: 1px solid #ccc;
  min-height: 90px;
  padding: 6px;
}

/* 土日色 */
.sat { background: #e6f0ff; }
.sun { background: #ffe6e6; }

/* 日付数字 */
.date {
  font-weight: bold;
}

/* イベント */
.event {
  margin-top: 3px;
  padding: 2px 4px;
  border-radius: 4px;
  font-size: 12px;
}

.couleur { background: #cb0cc8; color:#fff; }
.claris  { background: #0000cb; color:#fff; }
.fuel    { background: #2cb4ad; color:#fff; }
</style>
</head>

<body>

<h1>直近10日 空きカレンダー</h1>
<div id="info"></div>
<div id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const info = document.getElementById("info");

// 今日
const today = new Date();

// YYYY-MM-DD
function formatDate(d) {
  return d.toISOString().slice(0,10);
}

// 表示用
function formatJP(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// 月曜始まり変換
function getWeekIndex(d) {
  let w = d.getDay(); // 0=日
  return (w === 0) ? 6 : w - 1; // 月=0
}

// 土日色
function getDayClass(d) {
  const w = d.getDay();
  if (w === 0) return "sun";
  if (w === 6) return "sat";
  return "";
}

// メイン描画
function createCalendar(events) {

  calendar.innerHTML = "";

  // 曜日ヘッダー（月始まり）
  const days = ["月","火","水","木","金","土","日"];
  days.forEach(d => {
    const el = document.createElement("div");
    el.className = "header";
    el.textContent = d;
    calendar.appendChild(el);
  });

  // 最初の日の位置調整
  const startIndex = getWeekIndex(today);
  for (let i = 0; i < startIndex; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  // 10日分
  for (let i = 0; i < 10; i++) {

    const d = new Date();
    d.setDate(today.getDate() + i);

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day " + getDayClass(d);

    const dateEl = document.createElement("div");
    dateEl.className = "date";
    dateEl.textContent = formatJP(d);

    div.appendChild(dateEl);

    // 🔥 ここが今回の本体（10日分の○）
    events
      .filter(e => e.date === dateStr)
      .forEach(e => {
        const ev = document.createElement("div");
        ev.className = `event ${e.site}`;
        ev.textContent = `${e.site} ${e.part}`;
        div.appendChild(ev);
      });

    calendar.appendChild(div);
  }
}

// 情報表示
function showInfo() {
  const now = new Date();

  info.innerHTML = `
    今日: ${formatJP(today)}　
    更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}
  `;
}

// データ取得
fetch("https://yzcrue-kashiwa.github.io/calendar/events.json")
  .then(res => res.json())
  .then(data => {

    // 🔥 10日分だけ抽出
    const filtered = data.filter(e => {
      const d = new Date(e.date);
      const diff = (d - today) / (1000*60*60*24);
      return diff >= 0 && diff < 10;
    });

    console.log("10日分:", filtered);

    createCalendar(filtered);
    showInfo();
  })
  .catch(err => {
    console.error(err);
  });

</script>

</body>
</html>
