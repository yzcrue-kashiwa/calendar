<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空き状況</title>

<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

#updated {
  text-align: center;
  color: gray;
  margin-bottom: 10px;
}

.button-area {
  text-align: center;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.list {
  max-width: 500px;
  margin: auto;
}

.item {
  border-bottom: 1px solid #ccc;
  padding: 10px;
}

.date {
  font-weight: bold;
}

.source {
  font-size: 12px;
}

.type {
  font-weight: bold;
}

/* 色分け */
.couleur { color: blue; }
.colore { color: green; }
.claris { color: purple; }

.loading {
  text-align: center;
}
</style>
</head>

<body>

<h1>今後1ヶ月の空き状況</h1>

<p id="updated"></p>

<div class="button-area">
  <button onclick="reloadData()">🔄 更新する</button>
</div>

<div class="list" id="list"></div>

<script>
function reloadData() {
  const list = document.getElementById("list");
  const updated = document.getElementById("updated");

  list.innerHTML = '<div class="loading">🔄 更新中...</div>';

  fetch("data.json?nocache=" + new Date().getTime())
    .then(res => {
      const lastModified = res.headers.get("Last-Modified");

      if (lastModified) {
        const date = new Date(lastModified);
        const now = new Date();
        const diff = Math.floor((now - date) / 60000);

        updated.textContent =
          `最終更新: ${date.toLocaleString()}（${diff}分前）`;
      }

      return res.json();
    })
    .then(data => {
      list.innerHTML = "";

      const today = new Date();
      const oneMonthLater = new Date();
      oneMonthLater.setMonth(today.getMonth() + 1);

      // 1ヶ月以内に絞る
      const filtered = data.filter(d => {
        const date = new Date(d.date);
        return date >= today && date <= oneMonthLater;
      });

      // 日付順
      filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

      if (filtered.length === 0) {
        list.innerHTML = "今後1ヶ月の空きはありません";
        return;
      }

      filtered.forEach(d => {
        const div = document.createElement("div");
        div.className = "item";

        let colorClass = "";
        if (d.source === "Couleur") colorClass = "couleur";
        if (d.source === "Colore") colorClass = "colore";
        if (d.source === "Claris") colorClass = "claris";

        div.innerHTML = `
          <div class="date">${d.date}</div>
          <div class="source ${colorClass}">${d.source}</div>
          <div class="type">空きあり（${d.type}）</div>
        `;

        list.appendChild(div);
      });
    });
}

// 初回読み込み
reloadData();
</script>

</body>
</html>
