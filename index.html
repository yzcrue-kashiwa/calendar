<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタジオ空きカレンダー</title>
<style>
  body { font-family: sans-serif; padding: 1rem; background: #f7f7f7; }
  table { border-collapse: collapse; width: 100%; max-width: 600px; margin: auto; }
  th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: center; }
  th { background: #eee; }
  td.empty { background: #fff; color: #ccc; }
  td.available { background: #d4f4dd; color: #000; }
  #refresh { display: block; margin: 1rem auto; padding: 0.5rem 1rem; }
</style>
</head>
<body>
<h2 style="text-align:center;">スタジオ空きカレンダー</h2>
<button id="refresh">更新</button>
<table id="calendar">
  <thead>
    <tr>
      <th>月</th><th>火</th><th>水</th><th>木</th>
      <th>金</th><th>土</th><th>日</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadCalendar() {
  const res = await fetch("./data.json?nocache=" + new Date().getTime());
  const events = await res.json();

  // 今日から10日間だけ抽出、貸切は除外
  const today = new Date();
  const endDay = new Date();
  endDay.setDate(today.getDate() + 9);
  
  const filtered = events.filter(e => {
    const d = new Date(e.date);
    return d >= today && d <= endDay && e.type.includes('○');
  });

  // 日付ごとにまとめる
  const dayMap = {};
  filtered.forEach(e => {
    if (!dayMap[e.date]) dayMap[e.date] = [];
    dayMap[e.date].push(e.type + " (" + e.source + ")");
  });

  // カレンダー作成（今日〜10日間）
  const tbody = document.querySelector("#calendar tbody");
  tbody.innerHTML = "";

  let start = new Date(today);
  start.setDate(today.getDate() - today.getDay() + 1); // 月曜始まり

  for (let week = 0; week < 2; week++) {
    const tr = document.createElement("tr");
    for (let i = 0; i < 7; i++) {
      const td = document.createElement("td");
      const dStr = start.toISOString().slice(0,10);
      td.innerHTML = dayMap[dStr] ? dayMap[dStr].join("<br>") : "";
      td.className = dayMap[dStr] ? "available" : "empty";
      tr.appendChild(td);
      start.setDate(start.getDate() + 1);
    }
    tbody.appendChild(tr);
  }
}

document.getElementById("refresh").addEventListener("click", loadCalendar);
loadCalendar();
</script>
</body>
</html>
