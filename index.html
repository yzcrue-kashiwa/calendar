<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予約カレンダー</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

.header {
  font-weight: bold;
  text-align: center;
}

.day {
  border: 1px solid #ccc;
  min-height: 80px;
  padding: 5px;
  font-size: 13px;
}

.empty {
  border: none;
}

.today {
  background: #ffe0e0;
}

.sun { color: red; }
.sat { color: blue; }

.event {
  margin: 2px 0;
  padding: 2px;
  font-size: 11px;
  border-radius: 3px;
  color: #fff;
}

.couleur { background: #ff7aa2; }
.claris { background: #4da6ff; }
.fuel { background: #ff9f40; }

</style>
</head>

<body>

<h2>予約カレンダー</h2>
<p id="info"></p>

<div class="grid" id="calendar"></div>

<script>
const DAYS = 10;

// ===== 日付フォーマット =====
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

// ===== 今日から10日 =====
function getDates() {
  const dates = [];
  const today = new Date();

  for (let i = 0; i < DAYS; i++) {
    const d = new Date();
    d.setDate(today.getDate() + i);
    dates.push(new Date(d));
  }

  return dates;
}

// ===== メイン =====
async function load() {

  const res = await fetch("events.json?" + Date.now());
  const data = await res.json();

  const map = {};
  data.forEach(e => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  // ===== 曜日ヘッダー =====
  const days = ["月","火","水","木","金","土","日"];
  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "header";
    div.textContent = d;
    calendar.appendChild(div);
  });

  const dates = getDates();
  const today = new Date();
  const todayStr = formatDate(today);

  // ===== 月曜開始のための空白 =====
  const firstDay = dates[0].getDay();
  const offset = (firstDay === 0 ? 6 : firstDay - 1);

  for (let i = 0; i < offset; i++) {
    const empty = document.createElement("div");
    empty.className = "empty";
    calendar.appendChild(empty);
  }

  // ===== 本体 =====
  dates.forEach(d => {

    const dateStr = formatDate(d);

    const div = document.createElement("div");
    div.className = "day";

    if (dateStr === todayStr) div.classList.add("today");
    if (d.getDay() === 0) div.classList.add("sun");
    if (d.getDay() === 6) div.classList.add("sat");

    div.innerHTML = `<b>${d.getMonth()+1}/${d.getDate()}</b>`;

    if (map[dateStr]) {
      map[dateStr].forEach(ev => {
        const el = document.createElement("div");
        el.className = `event ${ev.site}`;
        el.textContent = `${ev.site} ${ev.part}`;
        div.appendChild(el);
      });
    }

    calendar.appendChild(div);
  });

  // ===== 更新情報 =====
  const now = new Date();
  document.getElementById("info").textContent =
    `取得日: ${todayStr} / 更新: ${now.toLocaleTimeString()}`;
}

load();
</script>

</body>
</html>
