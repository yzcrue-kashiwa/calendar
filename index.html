<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空きカレンダー</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  table { border-collapse: collapse; width: 100%; max-width: 600px; }
  th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
  th { background: #f0f0f0; }
  .today { background: #ffeb3b; }
  .empty { color: #ccc; }
</style>
</head>
<body>
<h1>空きカレンダー</h1>
<table id="calendar">
  <thead>
    <tr>
      <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadCalendar() {
  const res = await fetch('data.json');
  const events = await res.json();

  const today = new Date();
  const start = new Date(today);
  const end = new Date();
  end.setDate(today.getDate() + 10); // 今日〜10日間表示

  const tbody = document.querySelector('#calendar tbody');
  tbody.innerHTML = '';

  // 月曜始まりのカレンダー行
  let week = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    if (week.length === 7) {
      const tr = document.createElement('tr');
      week.forEach(td => tr.appendChild(td));
      tbody.appendChild(tr);
      week = [];
    }

    const td = document.createElement('td');
    td.textContent = d.getDate();

    const dayEvents = events.filter(e => e.date === d.toISOString().slice(0,10));
    if (dayEvents.length) td.textContent += ' ○'; 
    week.push(td);
  }
  if (week.length) {
    while (week.length < 7) week.push(document.createElement('td'));
    const tr = document.createElement('tr');
    week.forEach(td => tr.appendChild(td));
    tbody.appendChild(tr);
  }
}

loadCalendar();
</script>
</body>
</html>
