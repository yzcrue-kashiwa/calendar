<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空き状況</title>

<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
}

#updated {
  text-align: center;
  color: gray;
  margin-bottom: 10px;
}

.button-area {
  text-align: center;
  margin-bottom: 15px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.list {
  max-width: 500px;
  margin: auto;
}

.item {
  border-bottom: 1px solid #ccc;
  padding: 10px;
}

.date {
  font-weight: bold;
}

.source {
  font-size: 12px;
}

.type {
  font-weight: bold;
}

/* 色分け */
.couleur { color: blue; }
.colore { color: green; }
.claris { color: purple; }

.loading {
  text-align: center;
}
</style>
</head>

<body>

<h1>今後1ヶ月の空き状況</h1>

<p id="updated"></p>

<div class="button-area">
  <button onclick="reloadData()">🔄 更新する</button>
</div>

<div class="list" id="list"></div>

<script>
const grouped = {};

// 日付ごとにまとめる
filtered.forEach(d => {
  if (!grouped[d.date]) {
    grouped[d.date] = [];
  }
  grouped[d.date].push(d);
});

// 描画
Object.keys(grouped).forEach(date => {
  const div = document.createElement("div");
  div.className = "item";

  let inner = `<div class="date">${date}</div>`;

  grouped[date].forEach(d => {
    let colorClass = "";
    if (d.source === "Couleur") colorClass = "couleur";
    if (d.source === "Colore") colorClass = "colore";
    if (d.source === "Claris") colorClass = "claris";

    inner += `
      <div class="source ${colorClass}">
        ・${d.source}（${d.type}）
      </div>
    `;
  });

  div.innerHTML = inner;
  list.appendChild(div);
});
</script>

</body>
</html>
