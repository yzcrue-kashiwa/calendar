<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空きカレンダー</title>
<style>
body { font-family: Arial, sans-serif; }
table { border-collapse: collapse; width: 100%; max-width: 600px; margin: auto; }
th, td { border: 1px solid #ccc; text-align: center; padding: 8px; }
th { background-color: #f0f0f0; }
td.past { background-color: #eee; color: #999; }
td.available { background-color: #d0f0d0; }
</style>
</head>
<body>

<h2 style="text-align:center;">予約空きカレンダー</h2>
<div id="calendar"></div>

<script>
const today = new Date();

// JSON 読み込み
async function loadData() {
  const res = await fetch('data.json');
  const events = await res.json();
  return events;
}

// カレンダー描画
function renderCalendar(events) {
  const startDate = new Date();
  const endDate = new Date();
  endDate.setDate(startDate.getDate() + 10); // 今日〜10日間

  let html = '<table><tr>';
  const weekdays = ['月','火','水','木','金','土','日'];
  weekdays.forEach(day => html += `<th>${day}</th>`);
  html += '</tr><tr>';

  // 月曜始まりに調整
  let current = new Date(startDate);
  current.setDate(current.getDate() - (current.getDay() || 7) + 1);

  while (current <= endDate) {
    const dayEvents = events.filter(e => e.date === current.toISOString().slice(0,10));
    const hasAvailable = dayEvents.length > 0;

    const cls = current < today ? 'past' : hasAvailable ? 'available' : '';
    html += `<td class="${cls}">${current.getDate()}${hasAvailable ? '<br>○' : ''}</td>`;

    if (current.getDay() === 0) html += '</tr><tr>'; // 日曜で改行
    current.setDate(current.getDate() + 1);
  }

  html += '</tr></table>';
  document.getElementById('calendar').innerHTML = html;
}

loadData().then(events => renderCalendar(events));
</script>
</body>
</html>
