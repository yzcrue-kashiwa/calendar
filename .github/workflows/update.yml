name: update-data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libs
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python main.py

      # 🔥 デバッグ（どこに保存されたか確認）
      - name: List files
        run: ls -R

      # 🔥 全部コミット（パス問題完全回避）
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "update events" || echo "no changes"
          git push
